[book]
title = "CS1: Programming, Certified"
authors = ["Kevin Sullivan"]
language = "en"
description = "CS1: Programming, Certified"
src = "src"

[build]
build-dir = "book"

[output.html]
mathjax-support = true
git-repository-url = "https://github.com/kevinsullivan/Lean4CS1"
additional-js = ["mermaid.min.js", "mermaid-init.js"]

[output.html.print]
enable = true

[preprocessor.toc]
command = "mdbook-toc"
renderer = ["html"]

[preprocessor.mermaid]
command = "mdbook-mermaid"
renderer = ["html"]
