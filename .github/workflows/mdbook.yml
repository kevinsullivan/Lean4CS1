name: Deploy mdBook site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MDBOOK_VERSION: "0.4.52"
      MDBOOK_TOC_VERSION: "0.14.2"
      MDBOOK_MERMAID_VERSION: "0.15.0"
      MDBOOK_IMAGE_SIZE_VERSION: "0.2.1"

    steps:
      - uses: actions/checkout@v4

      # Download pre-built mdBook binary (~5 seconds vs 5-10 min cargo install)
      - name: Install mdBook
        run: |
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C /usr/local/bin

      # Cache Cargo binaries for the small preprocessors
      - name: Cache Cargo binaries
        uses: actions/cache@v4
        id: cache-cargo-binaries
        with:
          path: ~/.cargo/bin
          key: cargo-preprocessors-${{ runner.os }}-toc-${{ env.MDBOOK_TOC_VERSION }}-mermaid-${{ env.MDBOOK_MERMAID_VERSION }}-imgsize-${{ env.MDBOOK_IMAGE_SIZE_VERSION }}-v1

      - name: Install mdBook preprocessors
        if: steps.cache-cargo-binaries.outputs.cache-hit != 'true'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          cargo install --version "${MDBOOK_TOC_VERSION}"       mdbook-toc       --locked
          cargo install --version "${MDBOOK_IMAGE_SIZE_VERSION}" mdbook-image-size --locked
          cargo install --version "${MDBOOK_MERMAID_VERSION}"   mdbook-mermaid   --locked

      - name: Add Cargo bin to PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      # Python 3 is pre-installed on ubuntu-latest — no install needed
      - name: Convert Lean sources to Markdown
        run: |
          find FPCourse Distillate -name '*.lean' | while read f; do
            out="src/${f%.lean}.md"
            mkdir -p "$(dirname "$out")"
            python3 scripts/convert.py "$f" "$out"
          done

      # Normalize Markdown to NFC (handles any Unicode edge cases)
      - name: Normalize Markdown files to NFC
        run: |
          python3 - << 'PY'
          import os, unicodedata
          for root, _, files in os.walk("src"):
              for f in files:
                  if f.endswith(".md"):
                      p = os.path.join(root, f)
                      with open(p, 'rb') as fh:
                          b = fh.read()
                      try:
                          s = b.decode('utf-8')
                      except UnicodeDecodeError:
                          continue
                      n = unicodedata.normalize('NFC', s)
                      if n != s:
                          with open(p, 'w', encoding='utf-8', newline='\n') as out:
                              out.write(n)
          PY

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with mdBook
        run: mdbook build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book

  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
